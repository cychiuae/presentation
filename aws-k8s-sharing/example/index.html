<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Reveal</title>
<style>
    :root {
        --bg: #0a0e16;
        --bg-soft: #141c2a;
        --fg: #f4f6f8;
        --muted: #6ec6d0;
        --accent: #00d8ff;
        --warm: #ff8a4c;
        --border: rgba(110, 198, 208, 0.22);
        --font-display: 'Bricolage Grotesque', 'Inter', system-ui, sans-serif;
        --font-mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
        width: 100%;
        min-height: 100vh;
        background:
            radial-gradient(1000px 700px at 20% 20%, rgba(0, 216, 255, 0.10), transparent 70%),
            radial-gradient(800px 600px at 85% 90%, rgba(255, 138, 76, 0.08), transparent 70%),
            var(--bg);
        color: var(--fg);
        font-family: var(--font-display);
        overflow-x: hidden;
    }

    body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px 24px;
    }

    main {
        width: 100%;
        max-width: 760px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 36px;
    }

    main.revealed .reveal-btn { display: none; }
    main:not(.revealed) .grid { display: none; }

    .reveal-btn {
        position: relative;
        padding: 22px 56px;
        font: 600 22px/1 var(--font-display);
        letter-spacing: 0.04em;
        color: var(--bg);
        background: linear-gradient(120deg, var(--accent), var(--warm));
        border: none;
        border-radius: 999px;
        cursor: pointer;
        box-shadow:
            0 12px 40px rgba(0, 216, 255, 0.35),
            0 0 0 1px rgba(255, 255, 255, 0.08) inset;
        transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.4s ease;
    }
    .reveal-btn:hover {
        transform: translateY(-2px);
        box-shadow:
            0 18px 50px rgba(0, 216, 255, 0.45),
            0 0 0 1px rgba(255, 255, 255, 0.12) inset;
    }
    .reveal-btn:active { transform: translateY(0); }
    .reveal-btn.hidden {
        opacity: 0;
        pointer-events: none;
        transform: scale(0.92);
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
        width: 100%;
    }

    .card {
        aspect-ratio: 5 / 2;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 14px;
        background: rgba(20, 28, 42, 0.6);
        border: 1px solid var(--border);
        border-radius: 10px;
        font: 600 20px/1 var(--font-display);
        letter-spacing: -0.01em;
        color: var(--fg);
        opacity: 0;
        transform: translateY(20px) scale(0.96);
        transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
        overflow: hidden;
    }
    .card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--accent), transparent);
    }
    .card.show {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
    .card .idx {
        position: absolute;
        top: 8px; left: 10px;
        font: 500 10px/1 var(--font-mono);
        color: var(--muted);
        letter-spacing: 0.15em;
    }

    @media (max-width: 720px) {
        .grid { grid-template-columns: repeat(2, 1fr); }
        .card { font-size: 18px; }
    }
    @media (max-width: 420px) {
        .grid { grid-template-columns: 1fr; }
    }
</style>
</head>
<body>

<main id="main">
    <button class="reveal-btn" id="revealBtn" type="button">$$$$$</button>
    <div class="grid" id="grid" aria-live="polite"></div>
</main>

<script>
    const words = [
        "clock", "yellow", "tunnel",
        "planet", "vintage", "copper",
        "dynamic", "marble", "window",
        "oxygen", "forest", "blanket"
    ];

    const main = document.getElementById("main");
    const btn = document.getElementById("revealBtn");
    const grid = document.getElementById("grid");

    words.forEach((word, i) => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML =
            '<span class="idx">' + String(i + 1).padStart(2, "0") + '</span>' +
            '<span class="word">' + word + '</span>';
        grid.appendChild(card);
    });

    const STAGGER = 70;
    const TRANSITION = 250;
    const VISIBLE = 500;
    const START_DELAY = 100;

    let revealed = false;
    btn.addEventListener("click", () => {
        if (revealed) return;
        revealed = true;
        main.classList.add("revealed");

        const cards = grid.querySelectorAll(".card");
        cards.forEach((card, i) => {
            const showAt = START_DELAY + i * STAGGER;
            setTimeout(() => card.classList.add("show"), showAt);
            setTimeout(() => card.classList.remove("show"), showAt + TRANSITION + VISIBLE);
        });

        const lastShowAt = START_DELAY + (cards.length - 1) * STAGGER;
        const allHiddenAt = lastShowAt + TRANSITION + VISIBLE + TRANSITION;
        setTimeout(() => {
            main.classList.remove("revealed");
            revealed = false;
        }, allHiddenAt);
    });
</script>

</body>
</html>
